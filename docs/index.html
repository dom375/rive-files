<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rive Test</title>

  <script src="https://unpkg.com/@rive-app/canvas@2.9.1"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <canvas id="riveCanvas"></canvas>

  <script>
    new rive.Rive({
      src: "ui_panel_test.riv",
      canvas: document.getElementById("riveCanvas"),
      autoplay: true
    });
  </script>
</body>
</html>
